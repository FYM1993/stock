# ============================================================
# 龙头低吸策略 - 配置文件
# ============================================================
# 
# 💡 快速开始：
#   1. 运行: ./start.sh
#   2. 输入回测时间（格式: YYYYMMDD）
#   3. 等待数据下载
#   4. 自动开始回测
#
# ⚠️  重要：回测时间范围会被 start.sh 自动更新，无需手动修改！
# ============================================================

# 市场配置
market: csi300  # 股票池：csi300, csi500, all
benchmark: ~  # 不使用基准指数对比

# ============================================================
# 回测时间范围（⚠️ v18测试：2025年5-9月主升期）
# ============================================================
start_time: '2025-05-01'  # 回测开始时间
end_time: '2025-09-30'    # 回测结束时间

# 初始资金
account: 100000  # 100万

# 策略参数
strategy:
  # 龙头候选数量
  topk: 10
  
  # 最大持仓数
  max_positions: 3
  
  # 单只持仓比例
  position_size: 0.3
  
  # 情绪判断参数（使用相对百分位数）
  # 冰点百分位阈值（涨停数处于近期20%分位以下视为冰点）
  ice_point_percentile: 0.2
  
  # 高潮百分位阈值（涨停数处于近期80%分位以上视为高潮）
  climax_percentile: 0.8
  
  # 情绪回溯天数（用于计算百分位）
  emotion_lookback_days: 60
  
  # 均线周期
  ma_period: 5

# 执行器配置
executor:
  # 交易类型：day(日内), close(收盘)
  trade_type: close
  
  # 是否生成报告
  generate_report: true
  
  # 交易成本
  trade_cost:
    # 佣金率
    commission_rate: 0.0003  # 万三
    
    # 印花税（仅卖出）
    stamp_tax: 0.001  # 千一
    
    # 最低佣金
    min_commission: 5

# 风控参数
risk_control:
  # 单只股票最大亏损
  max_loss_per_stock: 0.1  # 10%
  
  # 总仓位最大亏损
  max_total_loss: 0.2  # 20%
  
  # 是否启用止损
  enable_stop_loss: true
